packages:
  - packages/*
  - "!packages/start-nitro-v2-vite-plugin"
  - apps/*
  - apps/fixtures/*
  - "!**/.tmp/**"

allowBuilds:
  "@parcel/watcher": true
  esbuild: true

ignoredBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - better-sqlite3
  - msw
  - prisma

onlyBuiltDependencies:
  - "@parcel/watcher"
  - cypress
  - esbuild

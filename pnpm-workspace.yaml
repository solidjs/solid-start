packages:
  - packages/*
  - apps/*
  - apps/fixtures/*
  - '!**/.tmp/**'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

ignoredBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - better-sqlite3
  - msw
  - prisma

onlyBuiltDependencies:
  - '@parcel/watcher'
  - cypress
  - esbuild

overrides:
  # TEMPORARY: Start now wires the router's server-function integration
  # (@solidjs/router/server) on top of the single-flight core protocol,
  # which needs the unpublished router work and the @solidjs/web bridge
  # carrying subscribeFlightData/collectFlightData. Link the sibling
  # checkouts until those releases ship, then remove these overrides and
  # pin the released versions.
  '@solidjs/router': link:../solid-router
  solid-js: link:../solid/packages/solid
  '@solidjs/web': link:../solid/packages/solid-web
